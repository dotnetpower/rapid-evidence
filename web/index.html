<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>rapid-evidence</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --success: #16a34a;
      --danger: #dc2626;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
    }

    header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .metric-label {
      display: block;
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 4px;
    }

    .metric-value {
      display: block;
      font-size: 1.5rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card h2 {
      margin: 0 0 4px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .card .hint {
      color: var(--muted);
      font-size: 0.8rem;
      margin: 0 0 16px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 6px;
    }

    textarea, input[type="number"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.85rem;
      color: var(--text);
      background: var(--surface);
      font-family: inherit;
      outline: none;
      transition: border-color 0.12s ease, box-shadow 0.12s ease;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.82rem;
      line-height: 1.5;
    }

    textarea:focus, input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
    }

    .preview {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .preview strong {
      color: var(--text);
      font-weight: 600;
    }

    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s ease;
    }

    button:hover:not(:disabled) { background: #1d4ed8; border-color: #1d4ed8; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .pool {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .pool-value {
      font-size: 1.25rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .pool-state {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .pool-desc {
      color: var(--muted);
      font-size: 0.8rem;
      margin: 0 0 16px;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .result {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.82rem;
    }

    .result-url {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    .badge {
      font-size: 0.7rem;
      color: var(--muted);
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      white-space: nowrap;
      background: #f9fafb;
    }

    .badge.ok { color: var(--success); border-color: #bbf7d0; background: #f0fdf4; }
    .badge.err { color: var(--danger); border-color: #fecaca; background: #fef2f2; }

    .empty {
      color: var(--muted);
      font-size: 0.82rem;
      padding: 12px 0;
      text-align: center;
    }

    @media (max-width: 760px) {
      .layout { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr; }
      .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>rapid-evidence</h1>
      <span class="subtitle" id="systemStatus">Idle</span>
    </header>

    <section class="metrics">
      <div class="metric">
        <span class="metric-label">Ready</span>
        <span class="metric-value" id="metricReady">0</span>
      </div>
      <div class="metric">
        <span class="metric-label">Active</span>
        <span class="metric-value" id="metricActive">0</span>
      </div>
      <div class="metric">
        <span class="metric-label">Queued</span>
        <span class="metric-value" id="metricQueued">0</span>
      </div>
    </section>

    <section class="layout">
      <article class="card">
        <h2>Targets</h2>
        <p class="hint">One URL per line, or separated by comma or semicolon.</p>

        <textarea id="urls">https://example.com/a
https://example.com/b
https://example.com/c</textarea>

        <div class="grid-3">
          <div>
            <label for="minVm">min_vm</label>
            <input type="number" id="minVm" value="1" min="1" />
          </div>
          <div>
            <label for="maxVm">max_vm</label>
            <input type="number" id="maxVm" value="3" min="1" />
          </div>
          <div>
            <label for="batchSize">batch_size</label>
            <input type="number" id="batchSize" value="4" min="1" />
          </div>
        </div>

        <div class="actions">
          <div class="preview" id="parsePreview"></div>
          <button id="runBtn">Run</button>
        </div>
      </article>

      <aside class="card">
        <h2>Run</h2>
        <p class="hint">Pool state and latest results.</p>

        <div class="pool">
          <span class="pool-value" id="poolValue">0 / 0</span>
          <span class="pool-state" id="poolState">standby</span>
        </div>
        <p class="pool-desc" id="poolSummary">No run yet.</p>

        <div class="results" id="results">
          <div class="empty">No results yet.</div>
        </div>
      </aside>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
